name: Build Jellyfin.wgt

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Tizen Studio CLI
        run: |
          sudo apt-get install -y expect
          curl -fsSL -o tizen-installer \
            "https://download.tizen.org/sdk/Installer/tizen-studio_4.5.1/web-cli_Tizen_Studio_4.5.1_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm tizen-installer
          echo "${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Set up signing profile
        run: |
          tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

          tizen security-profiles add \
            -n Jellyfin \
            -a "${GITHUB_WORKSPACE}/tizencert.p12" \
            -p 1234

          # Tizen 4.5.1 stores passwords as paths to .pwd files in profiles.xml.
          # Replace those paths with plaintext so tizen package prompts interactively
          # (the expect script then supplies the password).
          sed -i "s|${GITHUB_WORKSPACE}/tizencert.pwd|1234|g" \
            "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" \
            "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' \
            "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

          echo "profiles.xml:"
          cat "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      - name: Clone and build Jellyfin Web
        run: |
          git clone --depth 1 -b release-10.10.z \
            https://github.com/jellyfin/jellyfin-web.git ../jellyfin-web
          cd ../jellyfin-web
          npm ci --no-audit
          USE_SYSTEM_FONTS=1 npm run build:production

      - name: Prepare Jellyfin interface (www/)
        run: JELLYFIN_WEB_DIR=../jellyfin-web/dist npm ci --no-audit

      - name: Build WGT
        run: |
          tizen build-web \
            -e ".*" \
            -e "gulpfile.babel.js" \
            -e "README.md" \
            -e "node_modules/*" \
            -e "package*.json" \
            -e "yarn.lock"

          mkdir -p release
          expect ./package.exp || {
            cat "${GITHUB_WORKSPACE}/tizen-studio-data/cli/logs/cli.log" 2>/dev/null || true
            exit 1
          }

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin-${{ github.ref_name }}-${{ github.run_number }}
          path: release/Jellyfin.wgt
          retention-days: 30
