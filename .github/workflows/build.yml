name: Build Jellyfin.wgt

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java (required by Tizen Studio)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tizen Studio CLI
        run: |
          curl -fsSL -o tizen-studio-cli.bin \
            "https://download.tizen.org/sdk/Installer/tizen-studio_6.0/web-cli_Tizen_Studio_6.0_ubuntu-64.bin"
          chmod +x tizen-studio-cli.bin
          ./tizen-studio-cli.bin --accept-license "$HOME/tizen-studio"
          echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Set up signing certificate
        env:
          TIZEN_CERT_BASE64: ${{ secrets.TIZEN_CERT_BASE64 }}
          TIZEN_CERT_PASSWORD: ${{ secrets.TIZEN_CERT_PASSWORD }}
        run: |
          KEYSTORE_DIR="$HOME/tizen-studio-data/keystore/author"
          mkdir -p "$KEYSTORE_DIR"

          # Always generate a proper Tizen-format author certificate using the
          # Tizen CLI. A plain keytool RSA cert lacks the Tizen-specific OIDs
          # that tizen package requires for validation.
          CERT_PASSWORD="tizenselfcert"
          tizen certificate \
            -a "JellyfinAuthor" \
            -p "$CERT_PASSWORD" \
            -c "LU" \
            -s "Luxembourg" \
            -ct "Luxembourg" \
            -o "Jellyfin" \
            -u "Jellyfin" \
            -n "JellyfinAuthor" \
            -e "jeff.dostert@proton.me" \
            -f "author"

          # If a real Samsung/Tizen cert is stored as a secret, override it
          if [ -n "$TIZEN_CERT_BASE64" ]; then
            echo "Overriding with Samsung certificate from secret"
            echo "$TIZEN_CERT_BASE64" | base64 -d > "$KEYSTORE_DIR/author.p12"
            CERT_PASSWORD="$TIZEN_CERT_PASSWORD"
          else
            echo "No secret found — using self-signed Tizen certificate (developer mode TVs only)"
          fi

          # Find the SDK-public distributor key (compatible with self-signed Tizen certs).
          # Prefer sdk-public over patches/partner which requires a Samsung partner cert.
          DISTRIBUTOR_KEY=$(find "$HOME/tizen-studio" -path "*/sdk-public*" -name "tizen-distributor-signer.p12" 2>/dev/null | head -1)
          if [ -z "$DISTRIBUTOR_KEY" ]; then
            DISTRIBUTOR_KEY=$(find "$HOME/tizen-studio" -path "*/public*" -name "tizen-distributor-signer.p12" 2>/dev/null | head -1)
          fi
          if [ -z "$DISTRIBUTOR_KEY" ]; then
            echo "All .p12 files in Tizen Studio:"; find "$HOME/tizen-studio" -name "*.p12" 2>/dev/null
            DISTRIBUTOR_KEY=$(find "$HOME/tizen-studio" -name "tizen-distributor-signer.p12" 2>/dev/null | head -1)
          fi
          if [ -z "$DISTRIBUTOR_KEY" ]; then
            echo "ERROR: tizen-distributor-signer.p12 not found"; exit 1
          fi
          echo "Distributor key: $DISTRIBUTOR_KEY"

          PROFILE_DIR="$HOME/tizen-studio-data/profile"
          mkdir -p "$PROFILE_DIR"
          tizen cli-config "default.profiles.path=$PROFILE_DIR/profiles.xml"

          # Use the Tizen CLI to create the security profile so it encrypts the
          # passwords correctly in profiles.xml. Manually writing plaintext passwords
          # fails because tizen package tries to decrypt them.
          tizen security-profiles add \
            -n JellyfinProfile \
            -a "$KEYSTORE_DIR/author.p12" \
            -p "$CERT_PASSWORD" \
            -d "$DISTRIBUTOR_KEY" \
            -dp "tizenpkcs12passfordsign"

          echo "Profile created. profiles.xml:"
          cat "$PROFILE_DIR/profiles.xml"

      - name: Clone and build Jellyfin Web
        run: |
          # Match the branch to the jellyfin-web version declared in package.json
          git clone --depth 1 -b release-10.10.z \
            https://github.com/jellyfin/jellyfin-web.git ../jellyfin-web
          cd ../jellyfin-web
          npm ci --no-audit
          USE_SYSTEM_FONTS=1 npm run build:production

      - name: Prepare Jellyfin interface (www/)
        run: JELLYFIN_WEB_DIR=../jellyfin-web/dist npm ci --no-audit

      - name: Build WGT
        run: |
          tizen build-web \
            -e ".*" \
            -e "gulpfile.babel.js" \
            -e "README.md" \
            -e "node_modules/*" \
            -e "package*.json" \
            -e "yarn.lock"

          echo "=== profiles.xml content ==="
          cat "$HOME/tizen-studio-data/profile/profiles.xml" || echo "not found"

          echo "=== author.p12 size ==="
          ls -la "$HOME/tizen-studio-data/keystore/author/author.p12" || echo "not found"

          echo "=== Registered profiles ==="
          tizen security-profiles list || true

          echo "=== cli-config ==="
          tizen cli-config --list || true

          tizen package -t wgt -s JellyfinProfile -o . -- .buildResult || {
            echo "=== CLI log ==="
            cat "$HOME/tizen-studio-data/cli/logs/cli.log" 2>/dev/null || \
            cat "tizen-studio-data/cli/logs/cli.log" 2>/dev/null || \
            echo "cli.log not found"
            exit 1
          }

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin-${{ github.ref_name }}-${{ github.run_number }}
          path: Jellyfin.wgt
          retention-days: 30
