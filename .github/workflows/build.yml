name: Build Jellyfin.wgt

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java (required by Tizen Studio)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tizen Studio CLI
        run: |
          curl -fsSL -o tizen-studio-cli.bin \
            "https://download.tizen.org/sdk/Installer/tizen-studio_6.0/web-cli_Tizen_Studio_6.0_ubuntu-64.bin"
          chmod +x tizen-studio-cli.bin
          ./tizen-studio-cli.bin --accept-license "$HOME/tizen-studio"
          echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Set up signing certificate
        env:
          TIZEN_CERT_BASE64: ${{ secrets.TIZEN_CERT_BASE64 }}
          TIZEN_CERT_PASSWORD: ${{ secrets.TIZEN_CERT_PASSWORD }}
        run: |
          KEYSTORE_DIR="$HOME/tizen-studio-data/keystore/author"
          mkdir -p "$KEYSTORE_DIR"

          if [ -n "$TIZEN_CERT_BASE64" ]; then
            echo "Using certificate from repository secret"
            echo "$TIZEN_CERT_BASE64" | base64 -d > "$KEYSTORE_DIR/author.p12"
            CERT_PASSWORD="$TIZEN_CERT_PASSWORD"
          else
            echo "No secret found — generating self-signed author certificate"
            CERT_PASSWORD="tizenselfcert"
            keytool -genkeypair \
              -alias author \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650 \
              -storetype PKCS12 \
              -storepass "$CERT_PASSWORD" \
              -keypass "$CERT_PASSWORD" \
              -dname "CN=JellyfinAuthor, O=Jellyfin, C=LU" \
              -keystore "$KEYSTORE_DIR/author.p12"
          fi

          PROFILE_DIR="$HOME/tizen-studio-data/profile"
          mkdir -p "$PROFILE_DIR"

          # Find the distributor key bundled with Tizen Studio (path differs per version)
          DISTRIBUTOR_KEY=$(find "$HOME/tizen-studio" -name "tizen-distributor-signer.p12" 2>/dev/null | head -1)
          if [ -z "$DISTRIBUTOR_KEY" ]; then
            echo "ERROR: tizen-distributor-signer.p12 not found in Tizen Studio"
            find "$HOME/tizen-studio" -name "*.p12" 2>/dev/null || true
            exit 1
          fi
          echo "Distributor key: $DISTRIBUTOR_KEY"

          # Point the Tizen CLI at our profiles file
          tizen cli-config "default.profiles.path=$PROFILE_DIR/profiles.xml"

          # Write profiles.xml using printf to avoid YAML heredoc conflicts
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8" standalone="no"?>' \
            '<profiles active="JellyfinProfile" version="4.0">' \
            '  <profile name="JellyfinProfile">' \
            "    <profileitem ca=\"\" distributorSigner=\"\" key=\"$KEYSTORE_DIR/author.p12\" password=\"$CERT_PASSWORD\" rootca=\"\" type=\"Author\"/>" \
            "    <profileitem ca=\"\" distributorSigner=\"\" key=\"$DISTRIBUTOR_KEY\" password=\"tizenpkcs12passfordsign\" rootca=\"\" type=\"Distributor\"/>" \
            '    <profileitem ca="" distributorSigner="" key="" password="" rootca="" type="Distributor2"/>' \
            '  </profile>' \
            '</profiles>' \
            > "$PROFILE_DIR/profiles.xml"

          echo "profiles.xml written:"; cat "$PROFILE_DIR/profiles.xml"

      - name: Clone and build Jellyfin Web
        run: |
          # Match the branch to the jellyfin-web version declared in package.json
          git clone --depth 1 -b release-10.10.z \
            https://github.com/jellyfin/jellyfin-web.git ../jellyfin-web
          cd ../jellyfin-web
          npm ci --no-audit
          USE_SYSTEM_FONTS=1 npm run build:production

      - name: Prepare Jellyfin interface (www/)
        run: JELLYFIN_WEB_DIR=../jellyfin-web/dist npm ci --no-audit

      - name: Build WGT
        run: |
          tizen build-web \
            -e ".*" \
            -e "gulpfile.babel.js" \
            -e "README.md" \
            -e "node_modules/*" \
            -e "package*.json" \
            -e "yarn.lock"
          tizen package -t wgt -s JellyfinProfile -o . -- .buildResult

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin-${{ github.ref_name }}-${{ github.run_number }}
          path: Jellyfin.wgt
          retention-days: 30
